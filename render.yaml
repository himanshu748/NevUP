services:
  - type: web
    name: nevup-ai-engine
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nevup-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nevup-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: HF_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO

  - type: redis
    name: nevup-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: nevup-postgres
    plan: free

